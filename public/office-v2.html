<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Star 的像素办公室 | Zucchini</title>
    <style>
        @font-face {
            font-family: 'ArkPixel';
            src: url('/office/fonts/ark-pixel-12px-proportional-zh_cn.ttf.woff2') format('woff2');
            font-weight: normal;
            font-style: normal;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #1a1a2e;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            align-items: center;
            min-height: 100vh;
            font-family: 'ArkPixel', 'Courier New', monospace;
            padding: 20px 0;
            gap: 10px;
            overflow-x: hidden;
        }
        #main-stage {
            position: relative;
            width: 1280px;
            transition: transform .25s ease;
            will-change: transform;
        }
        #game-container {
            position: relative;
            border: 0;
            image-rendering: pixelated;
            width: 1280px;
            height: 720px;
            max-width: none;
            max-height: none;
            overflow: hidden;
        }
        #game-container canvas {
            width: 100% !important;
            height: 100% !important;
            image-rendering: pixelated;
            box-shadow: inset 0 0 0 4px #64477d;
            position: relative;
            z-index: 10;
        }
        #loading-overlay {
            position: fixed;
            inset: 0;
            background: #1a1a2e;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
        }
        #loading-text {
            color: #cbd5e1;
            font-size: 16px;
            margin-top: 20px;
        }
        #loading-progress {
            width: 300px;
            height: 4px;
            background: #333;
            border-radius: 2px;
            margin-top: 10px;
            overflow: hidden;
        }
        #loading-progress-bar {
            width: 0%;
            height: 100%;
            background: #51cf66;
            transition: width 0.3s ease;
        }
    </style>
</head>
<body>
    <div id="loading-overlay">
        <div id="loading-text">正在加载 Star 的像素办公室...</div>
        <div id="loading-progress">
            <div id="loading-progress-bar"></div>
        </div>
    </div>
    
    <div id="main-stage">
        <div id="game-container"></div>
    </div>

    <script src="/office/vendor/phaser-3.80.1.min.js"></script>
    <script>
        // 简化的 LAYOUT 配置
        const LAYOUT = {
            game: { width: 1280, height: 720 },
            star: { x: 640, y: 360 },
            forcePng: {}
        };
        
        let supportsWebP = false;
        let loadingProgressBar = document.getElementById('loading-progress-bar');
        let loadingText = document.getElementById('loading-text');
        let loadingOverlay = document.getElementById('loading-overlay');
        let loadedAssets = 0;
        let totalAssets = 3; // bg, star, desk
        
        function updateLoadingProgress() {
            loadedAssets++;
            const percent = Math.min(100, Math.round((loadedAssets / totalAssets) * 100));
            if (loadingProgressBar) loadingProgressBar.style.width = percent + '%';
            if (loadingText) loadingText.textContent = `正在加载 Star 的像素办公室... ${percent}%`;
            
            if (loadedAssets >= totalAssets) {
                setTimeout(() => {
                    if (loadingOverlay) {
                        loadingOverlay.style.transition = 'opacity 0.5s ease';
                        loadingOverlay.style.opacity = '0';
                        setTimeout(() => loadingOverlay.style.display = 'none', 500);
                    }
                }, 300);
            }
        }
        
        function preload() {
            this.load.image('bg', '/office/office_bg.webp');
            this.load.image('star', '/office/star-idle-v5.png');
            this.load.image('desk', '/office/desk-v3.webp');
            
            this.load.on('filecomplete', updateLoadingProgress);
        }
        
        function create() {
            // 添加背景
            const bg = this.add.image(640, 360, 'bg');
            bg.setDisplaySize(1280, 720);
            
            // 添加办公桌
            const desk = this.add.image(640, 500, 'desk');
            desk.setScale(0.8);
            
            // 添加角色（Star）
            const star = this.add.image(640, 400, 'star');
            star.setScale(0.5);
            
            // 添加标题
            this.add.text(640, 30, 'Star Office | Zucchini', {
                fontSize: '24px',
                fill: '#fff',
                fontFamily: 'ArkPixel, monospace'
            }).setOrigin(0.5);
            
            // 添加状态文字
            this.add.text(640, 680, '状态: 待命中 | 离线模式', {
                fontSize: '14px',
                fill: '#aaa',
                fontFamily: 'ArkPixel, monospace'
            }).setOrigin(0.5);
            
            // 简单的动画
            this.tweens.add({
                targets: star,
                y: 395,
                duration: 1000,
                yoyo: true,
                repeat: -1,
                ease: 'Sine.easeInOut'
            });
        }
        
        function update() {
            // 游戏循环
        }
        
        // 检测 WebP 支持
        const canvas = document.createElement('canvas');
        supportsWebP = canvas.toDataURL('image/webp').indexOf('data:image/webp') === 0;
        
        // 启动游戏
        const config = {
            type: Phaser.AUTO,
            width: 1280,
            height: 720,
            parent: 'game-container',
            pixelArt: true,
            backgroundColor: '#1a1a2e',
            scene: { preload, create, update }
        };
        
        new Phaser.Game(config);
    </script>
</body>
</html>
