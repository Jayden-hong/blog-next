<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Star Office - Zucchini</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #1a1a2e;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: monospace;
            color: #fff;
        }
        #game-container {
            width: 1280px;
            height: 720px;
            max-width: 100%;
            position: relative;
            background: #2a2a45;
            border: 4px solid #64477d;
        }
        #status {
            margin-top: 20px;
            padding: 10px 20px;
            background: #333;
            border-radius: 4px;
        }
        .error { color: #ff6b6b; }
        .success { color: #51cf66; }
    </style>
</head>
<body>
    <div id="game-container"></div>
    <div id="status">正在加载...</div>

    <script src="/office/vendor/phaser-3.80.1.min.js"></script>
    <script>
        const statusEl = document.getElementById('status');
        const API_BASE = 'http://34.220.93.56:18791';
        
        // 检测混合内容问题
        if (window.location.protocol === 'https:' && API_BASE.startsWith('http:')) {
            statusEl.innerHTML = '<span class="error">⚠️ 混合内容错误：HTTPS 页面无法访问 HTTP API</span>';
            console.error('Mixed Content: HTTPS page cannot access HTTP API');
        }
        
        // 测试 API 连接
        async function testAPI() {
            try {
                const response = await fetch(API_BASE + '/health', { 
                    mode: 'cors',
                    headers: { 'Accept': 'application/json' }
                });
                const data = await response.json();
                if (data.ok) {
                    statusEl.innerHTML = '<span class="success">✅ API 连接正常</span>';
                    initGame();
                }
            } catch (e) {
                statusEl.innerHTML = '<span class="error">❌ API 连接失败: ' + e.message + '</span>';
                console.error('API Error:', e);
            }
        }
        
        function initGame() {
            if (typeof Phaser === 'undefined') {
                statusEl.innerHTML = '<span class="error">❌ Phaser 未加载</span>';
                return;
            }
            
            statusEl.innerHTML = '<span class="success">✅ Phaser 已加载，正在启动游戏...</span>';
            
            // 简化版游戏配置
            const config = {
                type: Phaser.AUTO,
                width: 1280,
                height: 720,
                parent: 'game-container',
                pixelArt: true,
                scene: {
                    preload: function() {
                        // 加载背景
                        this.load.image('bg', '/office/office_bg.webp');
                        this.load.image('star', '/office/star-idle-v5.png');
                    },
                    create: function() {
                        // 添加背景
                        this.add.image(640, 360, 'bg');
                        // 添加角色
                        this.add.image(640, 360, 'star');
                        // 添加文字
                        this.add.text(640, 50, 'Star Office - Zucchini', {
                            fontSize: '32px',
                            fill: '#fff',
                            fontFamily: 'monospace'
                        }).setOrigin(0.5);
                    }
                }
            };
            
            new Phaser.Game(config);
        }
        
        // 页面加载完成后测试
        window.onload = testAPI;
    </script>
</body>
</html>
