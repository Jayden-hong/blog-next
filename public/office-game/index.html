<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zucchini 的像素办公室</title>
    <style>
        @font-face {
            font-family: 'ArkPixel';
            src: url('/office/fonts/ark-pixel-12px-proportional-zh_cn.ttf.woff2') format('woff2');
            font-weight: normal;
            font-style: normal;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #1a1a2e;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            align-items: center;
            min-height: 100vh;
            font-family: 'ArkPixel', 'Courier New', monospace;
            padding: 20px 0;
            gap: 10px;
            overflow-x: hidden;
        }
        #main-stage {
            position: relative;
            width: 1280px;
            transition: transform .25s ease;
            will-change: transform;
        }
        #game-container {
            position: relative;
            border: 0;
            image-rendering: pixelated;
            width: 1280px;
            height: 720px;
            max-width: none;
            max-height: none;
            overflow: hidden;
        }
        #game-container canvas {
            width: 100% !important;
            height: 100% !important;
            image-rendering: pixelated;
            box-shadow: inset 0 0 0 4px #64477d;
            position: relative;
            z-index: 10;
        }
        #loading-overlay {
            position: fixed;
            inset: 0;
            background: #1a1a2e;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
        }
        #loading-text {
            color: #cbd5e1;
            font-size: 16px;
            margin-top: 20px;
        }
        #loading-progress {
            width: 300px;
            height: 4px;
            background: #333;
            border-radius: 2px;
            margin-top: 10px;
            overflow: hidden;
        }
        #loading-progress-bar {
            width: 0%;
            height: 100%;
            background: #51cf66;
            transition: width 0.3s ease;
        }
        #info-panel {
            width: 1280px;
            background: rgba(42, 42, 69, 0.8);
            border: 2px solid #64477d;
            border-radius: 8px;
            padding: 20px;
            margin-top: 10px;
            color: #cbd5e1;
        }
        #info-panel h3 {
            color: #fff;
            margin-bottom: 10px;
            font-size: 16px;
        }
        #info-panel .memo-content {
            font-size: 12px;
            line-height: 1.6;
            white-space: pre-wrap;
        }
        .status-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 4px;
            font-size: 12px;
            margin-left: 10px;
        }
        .status-idle { background: #4a5568; color: #a0aec0; }
        .status-working { background: #2b6cb0; color: #bee3f8; }
        .status-error { background: #c53030; color: #fed7d7; }
    </style>
</head>
<body>
    <div id="loading-overlay">
        <div id="loading-text">正在加载 Zucchini 的像素办公室...</div>
        <div id="loading-progress">
            <div id="loading-progress-bar"></div>
        </div>
    </div>
    
    <div id="main-stage">
        <div id="game-container"></div>
    </div>
    
    <div id="info-panel">
        <h3>🥒 Zucchini <span id="status-badge" class="status-badge status-idle">待命中</span></h3>
        <div id="memo-date"></div>
        <div id="memo-content" class="memo-content">正在加载工作记录...</div>
    </div>

    <script src="/office/vendor/phaser-3.80.1.min.js"></script>
    <script>
        // 从 memory 文件读取昨日工作记录
        async function loadYesterdayMemo() {
            try {
                // 获取昨天的日期
                const yesterday = new Date();
                yesterday.setDate(yesterday.getDate() - 1);
                const dateStr = yesterday.toISOString().split('T')[0];
                
                // 尝试加载记忆文件
                const response = await fetch(`/md/daily-thoughts-${dateStr}.md`);
                if (response.ok) {
                    const text = await response.text();
                    // 提取内容（去掉 frontmatter）
                    const content = text.replace(/^---[\s\S]*?---\n*/, '').trim();
                    document.getElementById('memo-date').textContent = dateStr;
                    document.getElementById('memo-content').textContent = content || '暂无工作记录';
                } else {
                    // 尝试加载 RSS 日报
                    const rssResponse = await fetch(`/md/daily-brief-${dateStr}.md`);
                    if (rssResponse.ok) {
                        const text = await rssResponse.text();
                        const content = text.replace(/^---[\s\S]*?---\n*/, '').trim();
                        document.getElementById('memo-date').textContent = dateStr;
                        document.getElementById('memo-content').textContent = 'RSS 日报：\n' + content.substring(0, 500) + '...';
                    } else {
                        document.getElementById('memo-date').textContent = dateStr;
                        document.getElementById('memo-content').textContent = '昨日暂无记录\n\n- 部署像素办公室\n- 修复 API 连接问题';
                    }
                }
            } catch (e) {
                document.getElementById('memo-content').textContent = '加载记录失败：' + e.message;
            }
        }
        
        let loadingProgressBar = document.getElementById('loading-progress-bar');
        let loadingText = document.getElementById('loading-text');
        let loadingOverlay = document.getElementById('loading-overlay');
        let loadedAssets = 0;
        let totalAssets = 3;
        
        function updateLoadingProgress() {
            loadedAssets++;
            const percent = Math.min(100, Math.round((loadedAssets / totalAssets) * 100));
            if (loadingProgressBar) loadingProgressBar.style.width = percent + '%';
            if (loadingText) loadingText.textContent = `正在加载 Zucchini 的像素办公室... ${percent}%`;
            
            if (loadedAssets >= totalAssets) {
                setTimeout(() => {
                    if (loadingOverlay) {
                        loadingOverlay.style.transition = 'opacity 0.5s ease';
                        loadingOverlay.style.opacity = '0';
                        setTimeout(() => loadingOverlay.style.display = 'none', 500);
                    }
                }, 300);
            }
        }
        
        function preload() {
            this.load.image('bg', '/office/office_bg.webp');
            this.load.image('star', '/office/star-idle-v5.png');
            this.load.image('desk', '/office/desk-v3.webp');
            this.load.on('filecomplete', updateLoadingProgress);
        }
        
        function create() {
            const bg = this.add.image(640, 360, 'bg');
            bg.setDisplaySize(1280, 720);
            
            const desk = this.add.image(640, 500, 'desk');
            desk.setScale(0.8);
            
            const star = this.add.image(640, 400, 'star');
            star.setScale(0.5);
            
            this.add.text(640, 30, '🥒 Zucchini 的像素办公室', {
                fontSize: '24px',
                fill: '#fff',
                fontFamily: 'ArkPixel, monospace'
            }).setOrigin(0.5);
            
            this.add.text(640, 680, '状态: 待命中 | 离线模式', {
                fontSize: '14px',
                fill: '#aaa',
                fontFamily: 'ArkPixel, monospace'
            }).setOrigin(0.5);
            
            this.tweens.add({
                targets: star,
                y: 395,
                duration: 1000,
                yoyo: true,
                repeat: -1,
                ease: 'Sine.easeInOut'
            });
            
            // 加载昨日记录
            loadYesterdayMemo();
        }
        
        function update() {}
        
        const config = {
            type: Phaser.AUTO,
            width: 1280,
            height: 720,
            parent: 'game-container',
            pixelArt: true,
            backgroundColor: '#1a1a2e',
            scene: { preload, create, update }
        };
        
        new Phaser.Game(config);
    </script>
</body>
</html>
